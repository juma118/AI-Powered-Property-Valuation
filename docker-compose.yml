services:
  db:
    image: pgvector/pgvector:pg16
    container_name: proptech_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: proptech
    ports:
      # Host 5433 -> container 5432 to avoid clashing with a native Postgres
      # already listening on host 5432. Services connect via "db:5432" internally.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # NOTE: pgvector extension is created by the backend on startup
      # (app.database.init_db -> "CREATE EXTENSION IF NOT EXISTS vector"),
      # so no init.sql host bind mount is needed. Bind-mounting a single file
      # from a Windows drive can hang container start on Docker Desktop/WSL2.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d proptech"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: proptech_redis
    restart: unless-stopped
    ports:
      # Host 6380 -> container 6379 to avoid a stale host binding on 6379.
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    container_name: proptech_backend
    restart: unless-stopped
    env_file: .env
    environment:
      # In docker the services talk over the compose network, not localhost.
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/proptech
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    # Tables are created on startup via Base.metadata.create_all (see app/main.py lifespan).
    # Seed mock data after the stack is up with:
    #   docker compose exec backend python -m app.seed
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build: ./backend
    container_name: proptech_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/proptech
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info

  frontend:
    build: ./frontend
    container_name: proptech_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata:
